name: Release

# Prevent concurrent releases
concurrency:
  group: ${{ github.workflow }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    # Skip on manual triggers and when release-please itself pushes the release commit
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.actor != 'github-actions[bot]'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  publish:
    name: Publish to VS Code Marketplace
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle extension
        run: pnpm run bundle

      - name: Package VSIX
        run: pnpm dlx @vscode/vsce package --no-dependencies --allow-all-proposed-apis

      - name: Publish to Marketplace
        run: pnpm dlx @vscode/vsce publish --no-dependencies --allow-all-proposed-apis --pat ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX to GitHub Release
        if: needs.release-please.outputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          tag_name: ${{ needs.release-please.outputs.tag_name }}
